name: PhotoBoothIOS
options:
  bundleIdPrefix: com.photobooth
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_CFBundleDisplayName: "PhotoBooth"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"

targets:
  PhotoBoothIOS:
    type: application
    platform: iOS
    sources:
      - path: PhotoBoothIOS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.photobooth.ios
        INFOPLIST_FILE: PhotoBoothIOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_KEY_NSCameraUsageDescription: "PhotoBooth needs camera access to capture photos"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "PhotoBooth needs photo library access to save and import frames"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "PhotoBooth needs permission to save photos to your library"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      path: PhotoBoothIOS/Info.plist
      properties:
        CFBundleName: PhotoBooth
        CFBundleDisplayName: PhotoBooth
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "PhotoBooth needs camera access to capture photos"
        NSPhotoLibraryUsageDescription: "PhotoBooth needs photo library access to save and import frames"
        NSPhotoLibraryAddUsageDescription: "PhotoBooth needs permission to save photos to your library"
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
